<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Local Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #f97316;
            --primary-dark: #ea580c;
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface-hover: #252525;
            --text: #f5f5f5;
            --text-secondary: #a3a3a3;
            --border: #262626;
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Toast 通知 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--surface);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success {
            border-color: var(--success);
        }

        .toast.error {
            border-color: var(--error);
        }

        .toast-icon {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
        }

        .toast.success .toast-icon {
            background: var(--success);
        }

        .toast.error .toast-icon {
            background: var(--error);
        }

        /* 历史消息区域 */
        .history-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            /* 底部安全区 = 输入框高度(约68px) + 间距(20px) + iPhone安全区 */
            padding-bottom: calc(88px + env(safe-area-inset-bottom));
        }

        .message-group {
            margin-bottom: 20px;
        }

        .time-divider {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            color: var(--text-secondary);
            font-size: 12px;
        }

        .time-divider::before,
        .time-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .time-divider::before {
            margin-right: 12px;
        }

        .time-divider::after {
            margin-left: 12px;
        }

        .message {
            padding: 8px 0;
            line-height: 1.5;
            word-break: break-word;
        }

        .message-text {
            font-size: 15px;
            color: var(--text);
        }

        .message-status {
            margin-top: 4px;
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .message-status.sending {
            color: var(--warning);
        }

        .message-status.sent {
            color: var(--success);
        }

        .message-status.failed {
            color: var(--error);
        }

        .message-time {
            margin-left: 8px;
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        .message-status.sending .status-dot {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* 底部输入区域 */
        .input-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .message-input {
            width: 100%;
            min-height: 44px;
            max-height: 120px;
            padding: 10px 40px 10px 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg);
            color: var(--text);
            font-size: 15px;
            line-height: 1.4;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        .message-input:focus {
            border-color: var(--primary);
        }

        .expand-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .expand-btn:hover {
            background: var(--surface-hover);
            color: var(--text);
        }

        .send-btn {
            padding: 0 20px;
            height: 44px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            background: var(--primary-dark);
        }

        .send-btn:active {
            transform: scale(0.96);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 全屏输入模式 */
        .fullscreen-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg);
            z-index: 100;
            display: none;
            flex-direction: column;
        }

        .fullscreen-overlay.active {
            display: flex;
        }

        .fullscreen-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .fullscreen-title {
            font-size: 17px;
            font-weight: 500;
        }

        .fullscreen-close {
            padding: 8px 16px;
            border: none;
            background: var(--surface);
            color: var(--text);
            border-radius: 8px;
            cursor: pointer;
        }

        .fullscreen-textarea {
            flex: 1;
            width: 100%;
            padding: 16px;
            border: none;
            background: var(--bg);
            color: var(--text);
            font-size: 16px;
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        .fullscreen-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
        }

        .fullscreen-send {
            padding: 12px 32px;
            border: none;
            border-radius: 10px;
            background: var(--primary);
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 15px;
        }

        /* 连接状态指示器 */
        .connection-indicator {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--surface);
            z-index: 999;
        }

        .connection-indicator::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0;
            background: var(--primary);
            transition: width 0.3s;
        }

        .connection-indicator.connected::after {
            width: 100%;
            background: var(--success);
        }

        .connection-indicator.connecting::after {
            width: 60%;
            background: var(--warning);
            animation: connecting 1.5s infinite;
        }

        .connection-indicator.disconnected::after {
            width: 100%;
            background: var(--error);
        }

        @keyframes connecting {
            0% { left: -60%; }
            100% { left: 100%; }
        }

        /* 配对码输入对话框 */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-overlay.hidden {
            display: none;
        }

        .auth-container {
            background: var(--surface);
            padding: 32px 24px;
            border-radius: 16px;
            text-align: center;
            width: 90%;
            max-width: 320px;
            border: 1px solid var(--border);
        }

        .auth-container h2 {
            margin: 0 0 8px 0;
            font-size: 20px;
            color: var(--text);
        }

        .auth-container p {
            margin: 0 0 24px 0;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .auth-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 24px;
            letter-spacing: 8px;
            text-align: center;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            outline: none;
            margin-bottom: 16px;
            font-family: monospace;
        }

        .auth-input:focus {
            border-color: var(--primary);
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            font-weight: 500;
        }

        .auth-btn:hover {
            background: var(--primary-dark);
        }

        .auth-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .auth-error {
            color: var(--error);
            font-size: 13px;
            margin-top: 12px;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <!-- 连接状态指示条 -->
    <div class="connection-indicator" id="connectionIndicator"></div>

    <!-- Toast 通知 -->
    <div class="toast" id="toast">
        <span class="toast-icon">✓</span>
        <span class="toast-text"></span>
    </div>

    <!-- 配对码输入对话框 -->
    <div class="auth-overlay hidden" id="authOverlay">
        <div class="auth-container">
            <h2>连接 Local Portal</h2>
            <p>请输入电脑端显示的 4 位配对码</p>
            <input type="text" class="auth-input" id="authInput" maxlength="4" placeholder="0000">
            <button class="auth-btn" id="authBtn">连接</button>
            <div class="auth-error" id="authError"></div>
        </div>
    </div>

    <!-- 历史消息区域 -->
    <div class="history-container" id="historyContainer">
        <div class="empty-state" id="emptyState">
            <div class="empty-icon">🎤</div>
            <div class="empty-text">暂无消息，开始语音输入吧</div>
        </div>
    </div>

    <!-- 底部输入区域 -->
    <div class="input-container">
        <div class="input-wrapper">
            <textarea 
                class="message-input" 
                id="messageInput"
                placeholder="输入文字或使用语音输入..."
                rows="2"
            ></textarea>
            <button class="expand-btn" id="expandBtn" title="全屏输入">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>
                </svg>
            </button>
        </div>
        <button class="send-btn" id="sendBtn">发送</button>
    </div>

    <!-- 全屏输入覆盖层 -->
    <div class="fullscreen-overlay" id="fullscreenOverlay">
        <div class="fullscreen-header">
            <span class="fullscreen-title">输入消息</span>
            <button class="fullscreen-close" id="fullscreenClose">取消</button>
        </div>
        <textarea 
            class="fullscreen-textarea" 
            id="fullscreenTextarea"
            placeholder="输入文字..."
        ></textarea>
        <div class="fullscreen-footer">
            <button class="fullscreen-send" id="fullscreenSend">发送</button>
        </div>
    </div>

    <script>
        // WebSocket 连接
        let ws = null;
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 5;

        // DOM 元素
        const historyContainer = document.getElementById('historyContainer');
        const emptyState = document.getElementById('emptyState');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const expandBtn = document.getElementById('expandBtn');
        const fullscreenOverlay = document.getElementById('fullscreenOverlay');
        const fullscreenTextarea = document.getElementById('fullscreenTextarea');
        const fullscreenClose = document.getElementById('fullscreenClose');
        const fullscreenSend = document.getElementById('fullscreenSend');
        const toast = document.getElementById('toast');
        const connectionIndicator = document.getElementById('connectionIndicator');
        
        // 配对码输入元素
        const authOverlay = document.getElementById('authOverlay');
        const authInput = document.getElementById('authInput');
        const authBtn = document.getElementById('authBtn');
        const authError = document.getElementById('authError');

        // 消息存储
        let messages = [];
        let pairingCode = '';
        let isAuthenticated = false;

        // 从 URL 获取配对码
        function getCodeFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('code') || '';
        }

        // 从 sessionStorage 获取配对码
        function getCodeFromStorage() {
            try {
                return sessionStorage.getItem('lportal_code') || '';
            } catch (e) {
                return '';
            }
        }

        // 保存配对码到 sessionStorage
        function saveCodeToStorage(code) {
            try {
                sessionStorage.setItem('lportal_code', code);
            } catch (e) {
                // 忽略存储错误
            }
        }

        // 连接 WebSocket
        function connect() {
            updateConnectionStatus('connecting');
            
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                console.log('WebSocket connected');
                // 连接成功后发送配对码验证
                // 优先级：sessionStorage > URL > 输入框
                const code = getCodeFromStorage() || getCodeFromUrl();
                if (code) {
                    ws.send(JSON.stringify({ type: 'auth', code: code }));
                } else {
                    // 显示配对码输入框
                    showAuthDialog();
                }
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleServerMessage(data);
            };
            
            ws.onclose = () => {
                console.log('WebSocket closed');
                updateConnectionStatus('disconnected');
                isAuthenticated = false;
                
                // 尝试重连
                if (reconnectAttempts < maxReconnectAttempts) {
                    reconnectAttempts++;
                    setTimeout(connect, 2000 * reconnectAttempts);
                }
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                showToast('连接错误', 'error');
            };
        }

        // 显示配对码输入对话框
        function showAuthDialog() {
            authOverlay.classList.remove('hidden');
            authInput.value = '';
            authError.textContent = '';
            authInput.focus();
        }

        // 隐藏配对码输入对话框
        function hideAuthDialog() {
            authOverlay.classList.add('hidden');
        }

        // 发送配对码
        function sendAuthCode() {
            const code = authInput.value.trim();
            if (code.length !== 4 || !/^\d{4}$/.test(code)) {
                authError.textContent = '请输入 4 位数字配对码';
                return;
            }
            authError.textContent = '';
            authBtn.disabled = true;
            authBtn.textContent = '连接中...';
            
            pairingCode = code;
            // 保存到 sessionStorage，便于重连时自动使用
            saveCodeToStorage(code);
            ws.send(JSON.stringify({ type: 'auth', code: code }));
        }

        // 更新连接状态指示器
        function updateConnectionStatus(status) {
            connectionIndicator.className = 'connection-indicator ' + status;
        }

        // 处理服务器消息
        function handleServerMessage(data) {
            switch (data.type) {
                case 'auth_success':
                    // 配对码验证成功
                    isAuthenticated = true;
                    reconnectAttempts = 0;
                    updateConnectionStatus('connected');
                    hideAuthDialog();
                    showToast('已连接', 'success');
                    // 保存当前使用的配对码到 sessionStorage，便于重连
                    const currentCode = getCodeFromStorage() || getCodeFromUrl();
                    if (currentCode) {
                        saveCodeToStorage(currentCode);
                    }
                    break;
                    
                case 'auth_failed':
                    // 配对码验证失败
                    isAuthenticated = false;
                    showAuthDialog();  // 显示输入框让用户重新输入
                    authError.textContent = data.message || '配对码错误';
                    authBtn.disabled = false;
                    authBtn.textContent = '连接';
                    break;
                    
                case 'history':
                    // 加载历史消息（服务器返回的是倒序，需要反转）
                    messages = (data.data || []).reverse();
                    renderMessages();
                    scrollToBottom();
                    break;
                    
                case 'new':
                    // 新消息（广播）
                    // 检查是否是本地已发送的消息（通过 client_id 匹配）
                    const existingIndex = messages.findIndex(m => m.id == data.data.client_id);
                    if (existingIndex !== -1) {
                        // 更新本地消息为已发送状态
                        messages[existingIndex].id = data.data.id;
                        messages[existingIndex].status = 'sent';
                        renderMessages();
                    } else {
                        // 新消息，添加到列表
                        messages.push(data.data);
                        renderMessages();
                    }
                    scrollToBottom();
                    break;
                    
                case 'ack':
                    // 消息确认，更新发送状态
                    updateMessageStatus(data.id, 'sent');
                    break;
                    
                case 'server_close':
                    // 服务器关闭通知
                    showToast('服务已关闭', 'error');
                    updateConnectionStatus('disconnected');
                    isAuthenticated = false;
                    if (ws) {
                        ws.close();
                    }
                    break;
            }
        }

        // 滚动到底部
        function scrollToBottom() {
            historyContainer.scrollTop = historyContainer.scrollHeight;
        }

        // 渲染消息列表
        function renderMessages() {
            if (messages.length === 0) {
                emptyState.style.display = 'block';
                historyContainer.innerHTML = '';
                historyContainer.appendChild(emptyState);
                return;
            }
            
            emptyState.style.display = 'none';
            
            // 按时间分组（消息现在是正序：旧->新）
            let html = '';
            let currentDate = null;
            
            messages.forEach((msg, index) => {
                const msgDate = formatDate(msg.time);
                
                if (msgDate !== currentDate) {
                    currentDate = msgDate;
                    html += `<div class="time-divider">${msgDate}</div>`;
                }
                
                const statusClass = msg.status || 'sent';
                const statusText = {
                    'sending': '发送中...',
                    'sent': '已接收',
                    'failed': '发送失败'
                }[statusClass];
                
                // 格式化发送时间 (HH:MM:SS)
                const msgTime = new Date(msg.time);
                const timeStr = `${msgTime.getHours().toString().padStart(2, '0')}:${msgTime.getMinutes().toString().padStart(2, '0')}:${msgTime.getSeconds().toString().padStart(2, '0')}`;
                
                html += `
                    <div class="message" data-id="${msg.id}">
                        <div class="message-text">${escapeHtml(msg.text)}</div>
                        <div class="message-status ${statusClass}">
                            <span class="status-dot"></span>
                            <span>${statusText}</span>
                            <span class="message-time">${timeStr}</span>
                        </div>
                    </div>
                `;
            });
            
            historyContainer.innerHTML = html;
        }

        // 更新消息状态
        function updateMessageStatus(id, status) {
            // 1. 先更新 messages 数组中的状态（关键！避免重新渲染时覆盖）
            const msgIndex = messages.findIndex(m => m.id == id);
            if (msgIndex !== -1) {
                messages[msgIndex].status = status;
            }
            
            // 2. 更新 DOM
            const msgEl = document.querySelector(`[data-id="${id}"]`);
            if (msgEl) {
                const statusEl = msgEl.querySelector('.message-status');
                statusEl.className = 'message-status ' + status;
                
                const statusText = {
                    'sent': '已接收',
                    'failed': '发送失败'
                }[status] || '已接收';
                
                // 更新状态文本（第二个 span，第一个是 dot，第二个是状态文本）
                const statusTextEl = statusEl.querySelectorAll('span')[1];
                if (statusTextEl) {
                    statusTextEl.textContent = statusText;
                }
            }
        }

        // 发送消息
        function sendMessage(text, isFullscreen = false) {
            text = text.trim();
            if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
            
            // 生成临时 ID
            const tempId = 'temp_' + Date.now();
            
            // 添加到本地消息列表（显示发送中状态）
            const msg = {
                id: tempId,
                text: text,
                time: new Date().toISOString(),
                status: 'sending'
            };
            
            messages.push(msg);
            renderMessages();
            // 滚动到底部显示最新消息
            scrollToBottom();
            
            // 清空输入框
            if (isFullscreen) {
                fullscreenTextarea.value = '';
                closeFullscreen();
            } else {
                messageInput.value = '';
                messageInput.style.height = 'auto';
            }
            
            // 发送（包含 client_id 以便服务端正确返回 ack）
            ws.send(JSON.stringify({
                type: 'text',
                content: text,
                client_id: tempId,
                timestamp: Date.now()
            }));
        }

        // 显示 Toast
        function showToast(message, type = 'success') {
            const toastText = toast.querySelector('.toast-text');
            const toastIcon = toast.querySelector('.toast-icon');
            
            toastText.textContent = message;
            toastIcon.textContent = type === 'success' ? '✓' : '✗';
            toast.className = 'toast show ' + type;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 打开全屏输入
        function openFullscreen() {
            fullscreenTextarea.value = messageInput.value;
            fullscreenOverlay.classList.add('active');
            fullscreenTextarea.focus();
        }

        // 关闭全屏输入
        function closeFullscreen() {
            // 将全屏输入框的内容同步回小框
            messageInput.value = fullscreenTextarea.value;
            // 触发 input 事件更新高度
            messageInput.dispatchEvent(new Event('input'));
            fullscreenOverlay.classList.remove('active');
        }

        // 格式化日期
        function formatDate(isoString) {
            const date = new Date(isoString);
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const msgDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());
            
            if (msgDate.getTime() === today.getTime()) {
                return '今天';
            }
            
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            if (msgDate.getTime() === yesterday.getTime()) {
                return '昨天';
            }
            
            return `${date.getMonth() + 1}月${date.getDate()}日`;
        }

        // 转义 HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 配对码输入事件
        authBtn.addEventListener('click', sendAuthCode);
        
        authInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                sendAuthCode();
            }
        });
        
        // 限制输入只能数字
        authInput.addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '').slice(0, 4);
        });

        // 事件监听
        sendBtn.addEventListener('click', () => {
            sendMessage(messageInput.value);
        });

        expandBtn.addEventListener('click', openFullscreen);

        fullscreenClose.addEventListener('click', closeFullscreen);

        fullscreenSend.addEventListener('click', () => {
            sendMessage(fullscreenTextarea.value, true);
        });

        // 输入框自适应高度
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // Enter 发送，Shift+Enter 换行
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage(this.value);
            }
        });

        fullscreenTextarea.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage(this.value, true);
            }
        });

        // 页面关闭时关闭 WebSocket
        window.addEventListener('beforeunload', () => {
            if (ws) {
                ws.close();
            }
        });

        // 初始化连接
        connect();

        // 聚焦输入框
        messageInput.focus();
    </script>
</body>
</html>
